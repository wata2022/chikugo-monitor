<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <title>筑後大堰 若津 水位・潮位モニター</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Chikugo Ozeki / Wakatsu</p>
          <h1>筑後大堰 若津　水位・潮位モニター</h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" aria-label="更新">
          <span aria-hidden="true">↻</span>
        </button>
      </header>

      <section class="status-grid" aria-label="現在値">
        <article class="metric">
          <span class="metric-label">現在水位</span>
          <div class="water-readings">
            <div class="water-reading">
              <span>下流</span>
              <strong id="currentDownstreamLevel">--</strong>
            </div>
            <div class="water-reading">
              <span>上流</span>
              <strong id="currentUpstreamLevel">--</strong>
            </div>
          </div>
        </article>
        <article class="metric">
          <span class="metric-label">現在潮位</span>
          <strong id="currentTideLevel">--</strong>
          <small id="currentTideDetail">若津</small>
        </article>
        <article class="metric metric-wide">
          <span class="metric-label">最終更新時刻</span>
          <strong id="lastUpdated">--</strong>
          <small id="rowCount">--</small>
        </article>
      </section>

      <section class="chart-panel" aria-label="グラフ">
        <div class="range-tabs" role="tablist" aria-label="表示期間">
          <button class="range-button is-active" type="button" data-days="1" role="tab" aria-selected="true">今日</button>
          <button class="range-button" type="button" data-days="3" role="tab" aria-selected="false">3日</button>
          <button class="range-button" type="button" data-days="7" role="tab" aria-selected="false">7日</button>
        </div>
        <div id="chart" class="chart" role="img" aria-label="水位と潮位のグラフ"></div>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

      <section class="history-panel" aria-label="水位履歴">
        <h2>水位履歴</h2>
        <div class="history-grid">
          <section class="history-card" aria-label="下流水位履歴">
            <h3>下流水位履歴</h3>
            <div class="history-table-wrap">
              <table class="history-table">
                <thead>
                  <tr>
                    <th scope="col">時刻</th>
                    <th scope="col">水位</th>
                  </tr>
                </thead>
                <tbody id="downstreamHistoryBody">
                  <tr>
                    <td colspan="2">--</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
          <section class="history-card" aria-label="上流水位履歴">
            <h3>上流水位履歴</h3>
            <div class="history-table-wrap">
              <table class="history-table">
                <thead>
                  <tr>
                    <th scope="col">時刻</th>
                    <th scope="col">水位</th>
                  </tr>
                </thead>
                <tbody id="upstreamHistoryBody">
                  <tr>
                    <td colspan="2">--</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
