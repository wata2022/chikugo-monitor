name: Update monitor data

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update water and tide data
        run: |
          mkdir -p docs
          python stage2_water_tide.py \
            --merged-csv docs/merged.csv \
            --graph graph.png \
            --daily-graph-dir daily_graphs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/merged.csv water_level.csv tide_auto.csv
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update monitor data"
            git push
          fi
