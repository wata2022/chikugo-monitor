<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <title>筑後大堰 若津 水位・潮位モニター</title>
    <link rel="manifest" href="./manifest.json?v=18">
    <link rel="icon" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="stylesheet" href="./style.css?v=18">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
    <script src="./app.js?v=19" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="mobile-hero" aria-label="スマホ表示ヘッダー">
        <div class="bi-badge">
          <strong id="mobileMoonIcon" class="moon-icon" aria-hidden="true">🌕</strong>
          <span id="mobileMoonAge">月齢 --</span>
          <small id="mobileTideName">--</small>
        </div>
        <div class="mobile-title">
          <h1>筑後川昇開橋 若津 <span aria-hidden="true">♥</span></h1>
          <p id="mobileDateLabel">--</p>
        </div>
        <button id="mobileRefreshButton" class="hero-refresh" type="button" aria-label="更新">
          <span aria-hidden="true">↻</span>
        </button>
      </section>

      <header class="app-header">
        <div>
          <p class="eyebrow">Chikugo Ozeki / Wakatsu</p>
          <h1>筑後大堰 若津　水位・潮位モニター</h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" aria-label="更新">
          <span aria-hidden="true">↻</span>
        </button>
      </header>

      <section class="status-grid" aria-label="現在値">
        <article class="metric">
          <span class="metric-label">現在水位</span>
          <div class="water-readings">
            <div class="water-reading">
              <span>下流</span>
              <div>
                <strong id="currentDownstreamLevel">--</strong>
                <small id="currentDownstreamUpdatedAt">--</small>
              </div>
            </div>
            <div class="water-reading">
              <span>上流</span>
              <div>
                <strong id="currentUpstreamLevel">--</strong>
                <small id="currentUpstreamUpdatedAt">--</small>
              </div>
            </div>
          </div>
        </article>
        <article class="metric">
          <span class="metric-label">現在潮位</span>
          <strong id="currentTideLevel">--</strong>
          <small id="currentTideDetail">若津</small>
        </article>
        <article class="metric metric-wide">
          <span class="metric-label">最終更新時刻</span>
          <strong id="lastUpdated">--</strong>
          <small id="rowCount">--</small>
        </article>
      </section>

      <section class="chart-panel" aria-label="グラフ">
        <div class="range-tabs" role="tablist" aria-label="表示期間">
          <button class="range-button is-active" type="button" data-days="1" role="tab" aria-selected="true">今日</button>
          <button class="range-button" type="button" data-days="3" role="tab" aria-selected="false">3日</button>
          <button class="range-button" type="button" data-days="7" role="tab" aria-selected="false">7日</button>
        </div>
        <div class="mobile-chart-frame">
          <aside class="mobile-tide-panel" aria-label="現在潮位">
            <span>現在潮位</span>
            <strong id="mobileCurrentTide">--</strong>
            <small id="mobileTideTrend">--</small>
          </aside>
          <aside class="mobile-water-panel" aria-label="現在水位">
            <span>現在水位</span>
            <dl>
              <div>
                <dt>下流</dt>
                <dd id="mobileDownstreamLevel">--</dd>
                <dd id="mobileDownstreamUpdatedAt" class="water-updated-at">--</dd>
              </div>
              <div>
                <dt>上流</dt>
                <dd id="mobileUpstreamLevel">--</dd>
                <dd id="mobileUpstreamUpdatedAt" class="water-updated-at">--</dd>
              </div>
            </dl>
          </aside>
          <div id="chart" class="chart" role="img" aria-label="水位と潮位のグラフ"></div>
        </div>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

    </main>
  </body>
</html>
